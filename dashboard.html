<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <title>KPI Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;

            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 200px;
            text-align: center;
            border-radius: 12px;

        }

        .card h2 {
            margin: 10px 0;
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
        }

        /* canvas {
            margin-top: 50px;

            display: block;

            margin-right: auto;
        } */
        canvas {
            margin-top: 50px;
            width: 80% !important;
            height: 400px !important; /* 🔥 increase this (500px, 600px...) */
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>

<h1>📊 KPI Statistic Dashboard</h1>

<div class="container">
    <div class="card">
        <h2>Customers</h2>
        <p id="customers">--</p>
    </div>

    <div class="card">
        <h2>Organizations</h2>
        <p id="organizations">--</p>
    </div>

    <div class="card">
        <h2>Products</h2>
        <p id="products">--</p>
    </div>
</div>

<canvas id="kpiChart"></canvas>

<script>
    async function loadKPIs() {
        try {
            const res = await fetch('http://localhost:3000/totals');
            const data = await res.json();

            // 🧠 Fill cards with real data
            document.getElementById('customers').innerText = data.total_customers;
            document.getElementById('organizations').innerText = data.total_organizations;
            document.getElementById('products').innerText = data.total_products;

            // 📊 Chart
            const ctx = document.getElementById('kpiChart').getContext('2d');

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Customers', 'Organizations', 'Products'],
                    datasets: [{
                        label: 'KPI Overview',
                        data: [
                            data.total_customers,
                            data.total_organizations,
                            data.total_products
                        ]
                    }]
                },
                options: {
                    responsive: true
                }
            });

        } catch (err) {
            console.error('Error loading KPIs:', err);
        }
    }

    // 🚀 Run on page load
    loadKPIs();
</script>
</body>
